services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "9850:9850"
    environment:
      - PORT=9850
      - MONGO_URL=mongodb://mongo:27017
      - MONGO_DB_NAME=opump
      - OPNET_RPC_URL=https://testnet.opnet.org
      - NETWORK=testnet
      - FRONTEND_URL=https://opump.io
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo-data:
