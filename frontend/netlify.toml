[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# API proxy — routes /api/* to the backend, avoiding CORS issues
[[redirects]]
  from = "/api/*"
  to = "${API_URL}/:splat"
  status = 200
  force = true

# SPA fallback — must come after more specific redirects
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
