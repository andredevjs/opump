[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"
  functions = "../netlify/functions"

[build.environment]
  NODE_VERSION = "24"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# API redirects — map REST paths to Netlify Functions
# Order matters: more specific routes first

[[redirects]]
  from = "/api/v1/tokens/:address/trades"
  to = "/.netlify/functions/tokens-trades?address=:address"
  status = 200

[[redirects]]
  from = "/api/v1/tokens/:address/price"
  to = "/.netlify/functions/tokens-price?address=:address"
  status = 200

[[redirects]]
  from = "/api/v1/tokens/:address/ohlcv"
  to = "/.netlify/functions/tokens-ohlcv?address=:address"
  status = 200

[[redirects]]
  from = "/api/v1/tokens/:address"
  to = "/.netlify/functions/tokens-detail?address=:address"
  status = 200

# POST /api/v1/tokens goes to tokens-create; GET goes to tokens-list.
# Since Netlify redirects don't filter by method, both methods hit the same function.
# tokens-list handles GET, tokens-create handles POST — we use a router function.
[[redirects]]
  from = "/api/v1/tokens"
  to = "/.netlify/functions/tokens-list"
  status = 200

[[redirects]]
  from = "/api/v1/simulate/buy"
  to = "/.netlify/functions/simulate-buy"
  status = 200

[[redirects]]
  from = "/api/v1/simulate/sell"
  to = "/.netlify/functions/simulate-sell"
  status = 200

[[redirects]]
  from = "/api/v1/profile/:address/tokens"
  to = "/.netlify/functions/profile-tokens?address=:address"
  status = 200

[[redirects]]
  from = "/api/v1/stats"
  to = "/.netlify/functions/stats"
  status = 200

[[redirects]]
  from = "/api/v1/upload/image"
  to = "/.netlify/functions/upload-image"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/images/:key"
  to = "/.netlify/functions/serve-image?key=:key"
  status = 200

# SPA fallback — must come after more specific redirects
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
