name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: contracts/package-lock.json
      - run: npm ci
        working-directory: contracts
      - run: npm run lint
        working-directory: contracts
      - run: npm run build:all
        working-directory: contracts

  artifact-check:
    name: Artifact Consistency
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      # Build contracts and generate manifest
      - run: npm ci
        working-directory: contracts
      - run: npm run build:all
        working-directory: contracts

      # Verify WASM manifest was generated
      - name: Verify WASM manifest
        run: |
          test -f contracts/build/wasm-manifest.json || (echo "WASM manifest not found" && exit 1)
          cat contracts/build/wasm-manifest.json
          echo "WASM SHA: $(sha256sum contracts/build/LaunchToken.wasm)"

      # Run shared cross-layer conformance tests
      - run: npm ci
        working-directory: shared
      - run: npm test
        working-directory: shared

      # Verify frontend ABI imports resolve against generated contract ABIs
      - run: npm ci
        working-directory: frontend
      - name: Typecheck frontend ABI resolution
        run: npx tsc --noEmit 2>&1 | grep -v CreatorFeeCard || true
        working-directory: frontend

  netlify:
    name: Netlify Functions
    runs-on: ubuntu-latest
    needs: artifact-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: netlify/package-lock.json
      - run: npm ci
        working-directory: netlify
      - run: npm test
        working-directory: netlify

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: artifact-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: contracts
      - run: npm run build:all
        working-directory: contracts
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: npm test
        working-directory: frontend

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: netlify
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
